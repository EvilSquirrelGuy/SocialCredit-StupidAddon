features:
  join_reward: true
  early_game: true
  partial_tree_chop_warning: true
  chest_hoarding: true
  diamond_investigation: true
  stalking_penalty: true
  inspections: true
  propaganda: true
  audit_patrols: true

placeholderapi:
  enabled: true
starting-score: 0
max-history: 30

points:
  commend: 3
  sleep: 2
  crop-trample: -2
  bell-ring: -1
  lava-death: -4
  villager-kill: -8
  player-attack: -1
  hostile-mob-kill: 1
  fishing-success: 1
  fishing-junk: -1
  door-left-open: -1
  berry-bush-by-door: -3
  suspicious-diamond-investigation: -2
  inspection-positive-min: 1
  inspection-positive-max: 3
  inspection-negative-min: -3
  inspection-negative-max: -1
  first-join: 5
  first-log: 1
  first-stone: 1
  first-bed: 1
  first-shear: 1
  first-night-survived: 2
  cactus-injury: -1
  stalking-with-curious-intent: -1
  partial-tree-chop: -1
  wanted-bounty-reward: 25
  chest-hoarding: -2

cooldowns:
  commend-hours: 24
  sleep-hours: 18
  bell-ring-seconds: 30
  hostile-mob-kill-seconds: 20
  door-check-seconds: 45
  inspection-minutes: 20
  stalking-seconds: 30
  stalking-reset-seconds: 15
  propaganda-min-minutes: 8
  propaganda-max-minutes: 18
  partial-tree-check-seconds: 60
  chest-hoarding-seconds: 120

diamond-investigation:
  enabled: true
  threshold: 4
  window-seconds: 120

wanted:
  enabled: true
  threshold: -25

jail:
  enabled: true
  threshold: -75
  detention-seconds: 60
  use-world-spawn: true
  world: ""
  x: 0
  y: 80
  z: 0

public-shame:
  enabled: true
  thresholds:
    - -15
    - -25
    - -50
    - -75

audit-patrols:
  enabled: true
  interval-minutes: 12
  patrol-seconds: 600
  radius: 10
  move-interval-seconds: 6
  look-at-player-chance: 0.65
  armour:
    enabled: true
  scrutiny:
    extra-heat-chance: 0.85
    extra-heat-min: 10
    extra-heat-max: 25
  messages:
    - "A Ministry Auditor has arrived for a visibility exercise."
    - "Routine patrol presence has been increased in your area."
    - "A calm inspection unit is now observing local conduct."

chest-hoarding:
  enabled: true
  filled-slot-threshold: 20
  total-item-threshold: 500

decrees:
  current: "Door Security Campaign"
  definitions:
    "Door Security Campaign":
      description: "The Ministry reminds citizens that access control is a cornerstone of civilisation."
      mood: "Minor door negligence is under heightened review."
    "Mandatory Agricultural Week":
      description: "Agricultural output is a patriotic duty."
      mood: "Crop damage is considered especially regrettable."
    "National Fishing Initiative":
      description: "Recreational and productive fishing are strongly encouraged."
      mood: "Citizens are invited to bring honour to the water."
    "Compulsory Rest Order":
      description: "Well-rested citizens are productive citizens."
      mood: "Participation in the bedtime initiative is strongly preferred."

decay:
  enabled: true
  interval-hours: 24
  amount-toward-zero: 1

messages:
  broadcast-important: true

inspections:
  enabled: true
  messages:
    positive:
      - "Administratively acceptable"
      - "Patriotically tidy"
      - "Pleasantly compliant"
      - "Suspiciously efficient"
    negative:
      - "Suspicious posture"
      - "Unclear productive intent"
      - "Administratively untidy"
      - "Too much individualism"

titles:
  tiers:
    - min: 120
      label: "Model Citizen"
    - min: 60
      label: "Trusted Comrade"
    - min: 15
      label: "Administratively Acceptable"
    - min: -14
      label: "Under Routine Review"
    - min: -59
      label: "Socially Irregular"
    - min: -999999
      label: "Counterproductive Element"

tab-list:
  enabled: true
  positive-colour: "§a"
  negative-colour: "§c"
  zero-colour: "§7"

discord:
  enabled: false
  webhook-url: ""
  username: "The Ministry"
  avatar-url: ""
  score-alert-threshold: 3

propaganda:
  enabled: true
  min-minutes: 8
  max-minutes: 18
  retry-seconds-when-busy: 60
  min-players-online: 1
  respect-recent-webhook-activity: true
  min-seconds-since-any-webhook: 180
  broadcast-in-chat: true
  post-to-discord: true
  messages:
    - "The Ministry observes all things. Some of them are even documented."
    - "The collective encourages confidence, but not the kind that leaves every door open."
    - "Citizens may continue mining. Dramatic mining remains under observation."
    - "The State congratulates all who avoided preventable stupidity this hour."
early-game:
  enabled: true
  handbook-on-first-join: true
  announce-first-join: true
  first-night-window-minutes: 20
  cactus-grace-period-minutes: 10
version-checker:
  enabled: true
  notify-admins-on-join: true
  check-on-startup: true
  github-api-url: "https://api.github.com/repos/ZeeRaider/SocialCredit/releases/latest"
  releases-url: "https://github.com/ZeeRaider/SocialCredit/releases/latest"

heat:
  enabled: true
  max: 100
  decay_interval_seconds: 300
  decay_per_tick: 0.25

  social_credit_scaling:

    low_credit_multiplier: 1.5
    high_credit_multiplier: 0.5


        param($m)
        $block = $m.Groups[1].Value

        if ($block -notmatch '(?m)^\s*trigger_heat:\s*') {
            return $block
        }

        $block = $block -replace '(?m)^(\s*trigger_heat:\s*\d+\s*), "`
pillager_raids:

  enabled: true
  trigger_heat: 80
  trigger_heat_min: 60
  trigger_heat_max: 100
  waves: 3
  pillagers_per_wave: 4
  ravager_chance: 0.35

  messages:

   - "&cState Security Notice: %player% is under investigation."
   - "&cInternal Memo: Citizens should avoid assisting %player%."
   - "&cSecurity Broadcast: Enforcement units dispatched."
   - "&cState Radio: Illegal activity detected."

jail:

  enabled: true
  threshold: -75
  detention-seconds: 60
  use-world-spawn: true
  world: ""
  x: 0
  y: 80
  z: 0
  mode: LOCATION