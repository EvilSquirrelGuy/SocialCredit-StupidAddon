<!doctype html>
<html lang="en-GB">
  <head>
    <title>SocialCredit &ndash; Stupid Addon Configuration File</title>
    <style>
      @keyframes spin {
          from {
              transform: rotateZ(0deg);
              filter: hue-rotate(0deg);
          }
          to {
              transform: rotateZ(360deg);
              filter: hue-rotate(360deg);
          }
      }

      * {
          background-color: darkgreen;
          color: darkred;
          font-family: Wingdings, Webdings, "Comic Sans MS", monospace;

      }

      html {
        animation: 2s infinite linear spin;
      }
    </style>
  </head>
  <body>
    <!--Yes, this is fucking html. cry about it.-->
    <h1>SocialCredit &ndash; Stupid Addon Configuration</h1>
    <p>
      Well done, you've somehow managed to open this in your browser. Of course, you won't be able to understand any of
      this text since it's in Wingdings/Webdings, and it's spinning, but I digress. Go open this file in a text editor.
    </p>
    <!-- actual config goes here -->
    <main id="config">
      <section id="internal">
        <!-- Should we disable all optimisations? -->
        <input name="lag-mode" type="checkbox" />
      </section>
      <!-- which modules to load -->
      <section id="modules">
        <input name="lag-detect" type="checkbox" checked />
        <input name="eye-contact" type="checkbox" checked />
        <input name="chat-censor" type="checkbox" checked />
      </section>
      <!-- settings for the lag detect module -->
      <section id="lag-detect">
        <!-- How low TPS has to have been to trigger sanctions -->
        <input name="threshold" value="18.5" type="number" />
        <!-- Time period to check TPS for. Should be one of [1m, 5m, 15m] -->
        <!-- Changing this might decrease spike sensitivity, but sustained lag will be more punishing -->
        <input name="monitor-period" value="1m" type="text">
        <!-- Social credit penalty -->
        <input name="penalty" value="2" type="number" />
        <!-- Broadcast message -->
        <input name="message" value="The state has detected malicious performance-based sabotage. Everyone is a victim." type="text" />
        <!-- Reason -->
        <input name="reason" value="Malicious performance-based state sabotage" type="text" />
      </section>
      <!-- settings for the eye contact module -->
      <section id="eye-contact">
        <!-- Number of ticks you need to look at a player for before you lose social credits -->
        <input name="max-duration" value="100" type="number"/>
        <!-- How close you have to be before it counts as eye contact -->
        <input name="max-distance" value="5" type="number">
        <!-- Social credit penalty -->
        <input name="penalty" value="1" type="number" />
        <!-- Broadcast message to display -->
        <input name="message" value="Suspicious observation of player $1 detected. Please mind your own business." type="text"/>
        <!-- reason -->
        <input name="reason" value="Suspicious player observation" type="text"/>
      </section>
      <!-- Chat censorship settings -->
      <section id="chat-censor">
        <!-- Social credit penalty -->
        <input name="penalty" value="2" type="number"/>
        <!-- reason -->
        <input name="reason" value="Unapproved use of free speech" type="text" />
        <!-- message -->
        <input name="message" value="The Ministry does not approve of your use of free speech." type="text" />
        <!-- Regex to scan messages with -->
        <select name="messages">
          <!-- Value field should be populated with the actual regex to scan for -->
          <!-- Go learn regex yourself, I'm not helping you -->
          <option value="/(six.{0,2}(\s|-)seven*)|(67)/i"></option>
          <option value="/skibidi(\stoilet)?/gi"></option>
        </select>
      </section>
    </main>
    <!-- end config -->
  </body>
</html>
